name: release-export

on:
  release:
    types: [published]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate checksums
        run: bash scripts/generate_checksums.sh

      - name: Export governance bundle
        run: bash scripts/export_governance_bundle.sh

      - name: Upload export artifacts
        uses: actions/upload-artifact@v4
        with:
          name: governance-export
          path: exports/
